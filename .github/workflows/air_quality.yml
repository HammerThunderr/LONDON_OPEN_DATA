name: Update air quality data

on:
  schedule:
    # 04:07 on the 9th monthly. Defra publishes the new PCM year each autumn
    # (~mid-October), so a monthly poke picks it up within weeks. Minute/day
    # offset from the other workflows.
    - cron: "7 4 9 * *"
  workflow_dispatch: {}        # allow manual "Run workflow"

permissions:
  contents: write              # needed to commit the refreshed JSON

jobs:
  update-air-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape air quality data
        run: python scrapers/air_quality.py

      - name: Rebuild boroughs.json
        run: python scrapers/scores.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/air_quality.json data/boroughs.json
          if git diff --staged --quiet; then
            echo "No air quality changes."
          else
            git commit -m "data: refresh air quality + boroughs ($(date -u +%Y-%m-%d))"
            git push
          fi
