name: Update rent data

on:
  schedule:
    # 04:37 on the 20th monthly. ONS publishes PIPR mid-month (with the rent
    # bulletin), so the 20th reliably lands after each release. Minute/day
    # offset from the other workflows.
    - cron: "37 4 20 * *"
  workflow_dispatch: {}        # allow manual "Run workflow"

permissions:
  contents: write              # needed to commit the refreshed JSON

jobs:
  update-rent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape rent data
        run: python scrapers/rent.py

      - name: Rebuild boroughs.json
        run: python scrapers/scores.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rent.json data/boroughs.json
          if git diff --staged --quiet; then
            echo "No rent changes."
          else
            git commit -m "data: refresh rent + boroughs ($(date -u +%Y-%m-%d))"
            git push
          fi
