name: Update council tax data

on:
  schedule:
    # 03:41 on the 6th monthly. The release is annual (each March) but a cheap
    # monthly poke picks up the new financial year, and any revised tables,
    # within weeks. Minute offset from geography (03:11) and crime (04:23).
    - cron: "41 3 6 * *"
  workflow_dispatch: {}        # allow manual "Run workflow"

permissions:
  contents: write              # needed to commit the refreshed JSON

jobs:
  update-council-tax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape council tax data
        run: python scrapers/council_tax.py

      - name: Rebuild boroughs.json
        run: python scrapers/scores.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/council_tax.json data/boroughs.json
          if git diff --staged --quiet; then
            echo "No council tax changes."
          else
            git commit -m "data: refresh council tax + boroughs ($(date -u +%Y-%m-%d))"
            git push
          fi
