name: Update PTAL data

on:
  schedule:
    # 03:53 on the 7th monthly. TfL republishes PTAL in discrete years, so a
    # cheap monthly poke picks up a new vintage within weeks. Minute/day offset
    # from geography (03:11/5th), council tax (03:41/6th), crime (04:23 Mondays).
    - cron: "53 3 7 * *"
  workflow_dispatch: {}        # allow manual "Run workflow"

permissions:
  contents: write              # needed to commit the refreshed JSON

jobs:
  update-ptal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape PTAL data
        run: python scrapers/ptal.py

      - name: Rebuild boroughs.json
        run: python scrapers/scores.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ptal.json data/boroughs.json
          if git diff --staged --quiet; then
            echo "No PTAL changes."
          else
            git commit -m "data: refresh PTAL + boroughs ($(date -u +%Y-%m-%d))"
            git push
          fi
