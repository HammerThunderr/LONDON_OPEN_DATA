name: Update green space data

on:
  schedule:
    # 04:29 on the 13th monthly. Defra's access statistics are an annual-ish
    # release, so a monthly poke picks up a new edition within weeks.
    # Minute/day offset from the other workflows.
    - cron: "29 4 13 * *"
  workflow_dispatch: {}        # allow manual "Run workflow"

permissions:
  contents: write              # needed to commit the refreshed JSON

jobs:
  update-green-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape green space data
        run: python scrapers/green_space.py

      - name: Rebuild boroughs.json
        run: python scrapers/scores.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/green_space.json data/boroughs.json
          if git diff --staged --quiet; then
            echo "No green space changes."
          else
            git commit -m "data: refresh green space + boroughs ($(date -u +%Y-%m-%d))"
            git push
          fi
