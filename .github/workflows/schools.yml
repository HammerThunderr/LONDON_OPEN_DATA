name: Update schools data

on:
  schedule:
    # 04:19 on the 11th monthly. KS4 performance is an annual release (revised
    # data each spring), so a monthly poke picks up the new academic year
    # within weeks. Minute/day offset from the other workflows.
    - cron: "19 4 11 * *"
  workflow_dispatch: {}        # allow manual "Run workflow"

permissions:
  contents: write              # needed to commit the refreshed JSON

jobs:
  update-schools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape schools data
        run: python scrapers/schools.py

      - name: Rebuild boroughs.json
        run: python scrapers/scores.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schools.json data/boroughs.json
          if git diff --staged --quiet; then
            echo "No schools changes."
          else
            git commit -m "data: refresh schools + boroughs ($(date -u +%Y-%m-%d))"
            git push
          fi
