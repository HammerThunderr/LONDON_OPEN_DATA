name: Update crime data

on:
  schedule:
    # Weekly, Monday 04:23. The MPS dataset refreshes monthly but on a variable
    # date, so a cheap weekly poke picks it up within days. The commit step is
    # a no-op when nothing changed. Minute offset from geography.yml (03:11).
    - cron: "23 4 * * 1"
  workflow_dispatch: {}        # allow manual "Run workflow"

permissions:
  contents: write              # needed to commit the refreshed JSON

jobs:
  update-crime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape crime data
        run: python scrapers/crime.py

      - name: Rebuild boroughs.json
        run: python scrapers/scores.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/crime.json data/boroughs.json
          if git diff --staged --quiet; then
            echo "No crime data changes."
          else
            git commit -m "data: refresh crime + boroughs ($(date -u +%Y-%m-%d))"
            git push
          fi
